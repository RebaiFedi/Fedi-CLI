name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: Smoke test — pack and install tarball
        run: |
          npm pack
          TARBALL=$(ls fedi-cli-*.tgz)
          mkdir /tmp/smoke-test && cd /tmp/smoke-test
          npm init -y
          npm install "$GITHUB_WORKSPACE/$TARBALL"
          # Verify bin/fedi.js is present
          test -f node_modules/.bin/fedi
          echo "OK: bin/fedi exists"
          # Verify main() is exported and loadable
          node --input-type=module -e 'import("fedi-cli/dist/index.js").then(m => { if (typeof m.main === "function") { console.log("OK: main() exported"); process.exit(0); } else { console.error("FAIL: main() not found"); process.exit(1); } })'
          # Verify fedi --help runs and exits cleanly
          node node_modules/.bin/fedi --help | grep -q 'Fedi CLI'
          echo "OK: fedi --help works"
